<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>🧾 Booking / Reservation Form</h1>
    <p class="p6">
      ✈️ Book Your Dream Trip <br />
      Complete the form below to plan your perfect trip.
    </p>
    <form>
      <fieldset>
        <legend>Personal Information</legend>
        <table>
          <tr>
            <td><label for="">Full Name:</label></td>
            <td><input type="text" placeholder="Full Name" /></td>
          </tr>
          <tr>
            <td><label for="">CIN:</label></td>
            <td><input type="text" name="" id="" placeholder="CIN" /></td>
          </tr>
          <tr>
            <td><label for="">Email:</label></td>
            <td><input type="email" placeholder="Email" /></td>
          </tr>
          <tr>
            <td><label for="">Phone Number:</label></td>
            <td><input type="tel" placeholder="Phone Number" /></td>
          </tr>
          <tr>
            <td><label for="">Date Reservation:</label></td>
            <td><input type="date" /></td>
          </tr>
        </table>
      </fieldset>
    </form>
    <form action="">
      <fieldset>
        <legend>Travel Details</legend>
        <table>
          <tr>
            <td><label for="">Destination:</label></td>
            <td>
              <select>
                <option value="">Select your destination</option>
                <option>Paris</option>
                <option>Dubai</option>
                <option>Istanbul</option>
                <option>Maldives</option>
                <option>Barcelona</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="">Date:</label></td>
            <td>
              From: <input type="date" placeholder="Departure Date" /> to:
              <input type="date" placeholder="Return Date" />
            </td>
          </tr>
          <tr>
            <td><label for="">Number of Travelers:</label></td>
            <td><input type="number" placeholder="Number of Travelers" /></td>
          </tr>
          <tr>
            <td><label for="">Type of travelling:</label></td>
            <td>
              <select>
                <option value="">Please select</option>
                <option>Solo</option>
                <option>Couple</option>
                <option>Family</option>
              </select>
            </td>
          </tr>
        </table>
      </fieldset>
    </form>
    <form>
      <fieldset>
        <legend>Preferences</legend>
        <table>
          <tr>
            <td><label for="">Hotel:</label></td>
            <td>
              <select>
                <option value="">Select your hotel</option>
                <option>3★ Hotel</option>
                <option>4★ Hotel</option>
                <option>5★ Hotel</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="">Accomodation:</label></td>
            <td>
              <select>
                <option value="">Type of Accomodation</option>
                <option>Breakfast</option>
                <option>Half board</option>
                <option>Full board</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="">Transport:</label></td>
            <td>
              <select>
                <option value="">Select your Type</option>
                <option>Private Transport</option>
                <option>Shared Transport</option>
              </select>
            </td>
          </tr>
        </table>
      </fieldset>
    </form>
    <form>
      <fieldset>
        <legend>Payment</legend>
        <table>
          <tr>
            <td><label for="">Type:</label></td>
            <td>
              <select>
                <option value="">Select your type:</option>
                <option>Credit Card</option>
                <option>PayPal</option>
                <option>Cash</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="">Promo Code:</label></td>
            <td><input type="text" placeholder="Promo Code" /></td>
          </tr>
        </table>
      </fieldset>
    </form>
    <form action="">
      <fieldset>
        <legend>Additional Info</legend>
        <table>
          <tr>
            <td><label for="">Special Requests:</label></td>
            <td><textarea placeholder="Special Requests"></textarea></td>
          </tr>
          <tr>
            <td>
              <label> <input type="checkbox" /> I agree to terms </label>

              <button>Confirm Booking</button>
            </td>
          </tr>
        </table>
      </fieldset>
    </form>
    <table>
      <tr>
        <td>
          <a href="index.html" class="a2">Home</a>
        </td>
        <td>
          <a href="contact.html" class="a1">Contact</a>
        </td>
      </tr>
    </table>
  </body>
</html>
